<script>'use strict';

// ═══════════════════════════════════════════════════════════
//  CANVAS  —  W/H are mutable to support portrait on mobile
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 800, H = 600;
let scale = 1;
let isMobile = false;

function resize() {
  const pw = window.innerWidth, ph = window.innerHeight;
  isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
  const portrait = ph > pw * 1.1;            // aspect-ratio only — no touch check needed
  const newW = portrait ? 400 : 800;
  const newH = portrait ? 700 : 600;
  const changed = (newW !== W || newH !== H);
  W = newW; H = newH;
  PLAYER_Y_MIN = H / 3;
  // Reserve control-zone room when portrait OR touch device
  const needsCtrl = isMobile || portrait;
  PLAYER_Y_MAX = needsCtrl ? H - (portrait ? 140 : 120) : H - 22;
  scale = Math.min(pw / W, ph / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
  if (changed && typeof initStars === 'function') {
    initStars();
    if (typeof GS === 'string' && GS === 'play') GS = 'title';
  }
}
window.addEventListener('resize', resize);
// resize() called from BOOT after all functions are defined

// ═══════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════
const C = {
  bg:      '#07070f',
  cyan:    '#00e5ff',
  magenta: '#ff00aa',
  green:   '#00ff41',
  yellow:  '#ffe600',
  orange:  '#ff6600',
  red:     '#ff2244',
  purple:  '#aa00ff',
  white:   '#ffffff',
};

// ═══════════════════════════════════════════════════════════
//  DIFFICULTY CONFIG
// ═══════════════════════════════════════════════════════════
const DIFF = {
  ez: {
    label: 'EZ MODE', col: C.green,
    desc: ['Classic arcade shooter', 'Learn the ropes'],
    wspdBase: 1.0, wspdScale: 0.09, enemyMult: 1.0,
    wells: 0, chain: false, boosts: false, pSpd: 4.8,
  },
  mid: {
    label: 'MID MODE', col: C.yellow,
    desc: ['Gravity wells warp bullets', 'Chain reaction explosions'],
    wspdBase: 1.2, wspdScale: 0.11, enemyMult: 1.3,
    wells: 2, chain: true, boosts: false, pSpd: 5.4,
  },
  crazy: {
    label: 'CRAZY MODE', col: C.red,
    desc: ['Everything, but faster', 'Speed boosts + max chaos'],
    wspdBase: 1.55, wspdScale: 0.14, enemyMult: 1.7,
    wells: 3, chain: true, boosts: true, pSpd: 6.2,
  },
};
let difficulty = 'ez';

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
let _ac = null;
function getAC() {
  if (!_ac) try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  return _ac;
}
function snd(type) {
  const a = getAC(); if (!a) return;
  if (a.state === 'suspended') a.resume();
  const t = a.currentTime;
  const g = a.createGain(); g.connect(a.destination);

  const osc = (tp, fr, dur, vol = 0.2) => {
    const o = a.createOscillator(), gn = a.createGain();
    o.type = tp; o.connect(gn); gn.connect(g);
    o.frequency.setValueAtTime(fr, t);
    gn.gain.setValueAtTime(vol, t);
    gn.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
    return o;
  };
  const noise = (dur, vol, fc = 80) => {
    const buf = a.createBuffer(1, Math.ceil(a.sampleRate * dur), a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
    const src = a.createBufferSource(); src.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(900, t);
    f.frequency.exponentialRampToValueAtTime(fc, t + dur);
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.start(t); src.stop(t + dur);
  };

  switch (type) {
    case 'shoot':      { const o=osc('square',880,.09,.14); o.frequency.exponentialRampToValueAtTime(180,t+.09); break; }
    case 'explode':    noise(.32,.45); break;
    case 'bigexplode': noise(.72,.82,40); break;
    case 'chain':      noise(.18,.3,200); break;
    case 'hit':        { const o=osc('sawtooth',200,.15,.28); o.frequency.exponentialRampToValueAtTime(50,t+.15); break; }
    case 'powerup':
      [440,660,880].forEach((f,i)=>{
        const o2=a.createOscillator(),gn=a.createGain();
        o2.type='sine'; o2.frequency.value=f; o2.connect(gn); gn.connect(g);
        gn.gain.setValueAtTime(0,t+i*.08); gn.gain.linearRampToValueAtTime(.24,t+i*.08+.03);
        gn.gain.exponentialRampToValueAtTime(.0001,t+i*.08+.2); o2.start(t+i*.08); o2.stop(t+i*.08+.22);
      }); break;
    case 'boost':      { const o=osc('square',1200,.15,.18); o.frequency.linearRampToValueAtTime(600,t+.15); break; }
    case 'well':       { const o=osc('sine',55,.6,.4); o.frequency.linearRampToValueAtTime(30,t+.6); break; }
    case 'gameover':   [261.6,220,174.6,130.8].forEach((f,i)=>setTimeout(()=>osc('sawtooth',f,.22,.28),i*260)); break;
    case 'wave':       [523,659,784].forEach((f,i)=>setTimeout(()=>osc('square',f,.12,.18),i*110)); break;
    case 'bossappear': { const o=osc('sawtooth',55,1.2,.55); o.frequency.linearRampToValueAtTime(32,t+1.2); break; }
    case 'enemyshoot': { const o=osc('triangle',360,.13,.07); o.frequency.exponentialRampToValueAtTime(90,t+.13); break; }
  }
}

// ═══════════════════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════════════════
const rng   = (lo,hi) => Math.random()*(hi-lo)+lo;
const rngI  = (lo,hi) => Math.floor(rng(lo,hi+1));
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const lerp  = (a,b,t) => a+(b-a)*t;
const PI2   = Math.PI*2;
const dist2 = (ax,ay,bx,by) => (ax-bx)**2+(ay-by)**2;

function overlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ═══════════════════════════════════════════════════════════
//  OBJECT POOL
// ═══════════════════════════════════════════════════════════
class Pool {
  constructor(Cls,n=256){ this.all=Array.from({length:n},()=>new Cls()); }
  get(){ for(const o of this.all) if(!o.active) return o; return this.all[0]; }
  update(dt){ for(const o of this.all) if(o.active) o.update(dt); }
  draw(){ for(const o of this.all) if(o.active) o.draw(ctx); }
  clear(){ for(const o of this.all) o.active=false; }
  forEach(fn){ for(const o of this.all) if(o.active) fn(o); }
  count(){ let n=0; for(const o of this.all) if(o.active) n++; return n; }
}

// ═══════════════════════════════════════════════════════════
//  SCREEN SHAKE
// ═══════════════════════════════════════════════════════════
let shX=0,shY=0,shMag=0,shDur=0;
function shake(mag,dur){ if(mag>shMag){shMag=mag;shDur=dur;} }
function tickShake(dt){
  if(shDur>0){
    shDur-=dt; const m=shMag*Math.max(0,shDur/0.5);
    shX=rng(-m,m); shY=rng(-m,m);
    if(shDur<=0){shX=shY=shMag=0;}
  }
}

// ═══════════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════════
class Star {
  constructor(layer){ this.layer=layer; this.spd=[.24,.72,1.75][layer]; this.sz=[.6,1.1,1.7][layer]; this.reset(true); }
  reset(init){ this.x=rng(0,W); this.y=init?rng(0,H):-2; this.b=rng(.3,1); }
  update(dt){ this.y+=this.spd*dt*60; if(this.y>H+2)this.reset(false); }
  draw(ctx){ ctx.globalAlpha=this.b; ctx.fillStyle='rgb(180,210,255)'; ctx.fillRect(this.x,this.y,this.sz,this.sz*(1+this.layer*.7)); ctx.globalAlpha=1; }
}
let stars=[];
function initStars(){ stars=[]; [70,35,18].forEach((n,i)=>{ for(let k=0;k<n;k++) stars.push(new Star(i)); }); }

// ═══════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════
class Particle {
  constructor(){ this.active=false; }
  spawn(x,y,vx,vy,col,life,sz,glow=true){
    this.active=true; this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.life=this.maxLife=life; this.sz=sz; this.glow=glow;
  }
  update(dt){
    this.x+=this.vx*dt*60; this.y+=this.vy*dt*60;
    this.vy+=.015*dt*60; this.vx*=Math.pow(.97,dt*60); this.vy*=Math.pow(.97,dt*60);
    this.life-=dt; if(this.life<=0)this.active=false;
  }
  draw(ctx){
    const t=this.life/this.maxLife; ctx.globalAlpha=t*t;
    const s=this.sz*(.4+t*.6);
    if(this.glow){ctx.shadowColor=this.col;ctx.shadowBlur=s*3;}
    ctx.fillStyle=this.col; ctx.fillRect(this.x-s*.5,this.y-s*.5,s,s);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
}
const PARTS=new Pool(Particle,700);

function burst(x,y,col,n=20,spd=3,sz=4){
  for(let i=0;i<n;i++){
    const a=rng(0,PI2),s=rng(.3,spd);
    PARTS.get().spawn(x+rng(-4,4),y+rng(-4,4),Math.cos(a)*s,Math.sin(a)*s,col,rng(.35,.9),rng(1.5,sz));
  }
}
function exhaust(x,y,col){ PARTS.get().spawn(x+rng(-4,4),y+rng(-1,2),rng(-.15,.15),rng(.05,.2),col,.22,rng(1,3),false); }

// ═══════════════════════════════════════════════════════════
//  BULLETS
// ═══════════════════════════════════════════════════════════
class Bullet {
  constructor(){ this.active=false; this.trail=[]; }
  spawn(x,y,vx,vy,isPlayer,col,w=4,h=13){
    this.active=true; this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.isPlayer=isPlayer; this.col=col; this.w=w; this.h=h; this.trail=[];
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y}); if(this.trail.length>6)this.trail.shift();
    this.x+=this.vx*dt*60; this.y+=this.vy*dt*60;
    if(this.y<-30||this.y>H+30||this.x<-30||this.x>W+30)this.active=false;
  }
  applyGravity(activeWells,dt){
    for(const w of activeWells){
      const dx=w.x-this.x, dy=w.y-this.y;
      const d2=dx*dx+dy*dy, d=Math.sqrt(d2);
      if(d<=w.killR){ this.active=false; return; }
      if(d<w.pullR){
        const f=(w.mass/d2)*dt*60;
        this.vx+=(dx/d)*f; this.vy+=(dy/d)*f;
        const sp=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
        if(sp>14){this.vx=this.vx/sp*14; this.vy=this.vy/sp*14;}
      }
    }
  }
  draw(ctx){
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=(i/this.trail.length)*.35; ctx.fillStyle=this.col;
      ctx.fillRect(this.trail[i].x-this.w*.3,this.trail[i].y-this.h*.3,this.w*.6,this.h*.6);
    }
    ctx.globalAlpha=1;
    ctx.shadowColor=this.col; ctx.shadowBlur=9; ctx.fillStyle=this.col;
    ctx.fillRect(this.x-this.w*.5,this.y-this.h*.5,this.w,this.h);
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.fillRect(this.x-1,this.y-this.h*.5,2,this.h);
  }
  get bounds(){ return{x:this.x-this.w*.5,y:this.y-this.h*.5,w:this.w,h:this.h}; }
}
const BULLETS=new Pool(Bullet,400);

function playerShot(x,y,vx,vy){ BULLETS.get().spawn(x,y,vx,vy,true,C.cyan,4,14); snd('shoot'); }
function enemyShot(x,y,vx,vy,col){ BULLETS.get().spawn(x,y,vx,vy,false,col||C.magenta,4,10); snd('enemyshoot'); }

// ═══════════════════════════════════════════════════════════
//  GRAVITY WELLS
// ═══════════════════════════════════════════════════════════
class GravityWell {
  constructor(){ this.active=false; }
  spawn(x,y){
    this.active=true; this.x=x; this.y=y;
    this.killR=20; this.pullR=240; this.mass=rng(3500,6500);
    this.vx=rng(-.35,.35); this.vy=rng(-.12,.12); this.t=0;
  }
  update(dt){
    this.x+=this.vx*dt*60; this.y+=this.vy*dt*60; this.t+=dt;
    if(this.x<55||this.x>W-55)this.vx*=-1;
    if(this.y<55||this.y>H*.52)this.vy*=-1;
    this.x=clamp(this.x,55,W-55); this.y=clamp(this.y,55,H*.52);
  }
  draw(ctx){
    const x=this.x,y=this.y,t=this.t;
    const g=ctx.createRadialGradient(x,y,0,x,y,this.killR*3.5);
    g.addColorStop(0,'#000'); g.addColorStop(.45,'#0a0018'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,this.killR*3.5,0,PI2); ctx.fill();
    for(let i=0;i<4;i++){
      const ang=t*(1.8+i*.4)+(i/4)*PI2, r=this.killR*1.3+i*11;
      ctx.strokeStyle=`rgba(170,0,255,${.55-i*.1})`; ctx.lineWidth=2.2-i*.35;
      ctx.shadowColor='#9900ff'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(x,y,r,ang,ang+PI2*.65); ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x,y,this.killR*.85,0,PI2); ctx.fill();
    ctx.fillStyle='rgba(190,80,255,.28)'; ctx.beginPath(); ctx.arc(x,y,this.killR*.3,0,PI2); ctx.fill();
    ctx.strokeStyle='rgba(100,0,200,.07)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(x,y,this.pullR,0,PI2); ctx.stroke();
  }
  get bounds(){ return{x:this.x-this.killR,y:this.y-this.killR,w:this.killR*2,h:this.killR*2}; }
}
const WELLS=new Pool(GravityWell,5);

// ═══════════════════════════════════════════════════════════
//  SHOCKWAVES  (chain reaction visual)
// ═══════════════════════════════════════════════════════════
class Shockwave {
  constructor(){ this.active=false; }
  spawn(x,y,col){ this.active=true; this.x=x; this.y=y; this.col=col; this.r=0; this.maxR=110; this.speed=190; }
  update(dt){ this.r+=this.speed*dt; if(this.r>=this.maxR)this.active=false; }
  draw(ctx){
    const t=1-this.r/this.maxR;
    ctx.globalAlpha=t*.8; ctx.strokeStyle=this.col; ctx.lineWidth=2.5;
    ctx.shadowColor=this.col; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,PI2); ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}
const SHOCKWAVES=new Pool(Shockwave,60);

function triggerChain(x,y,col,depth=0){
  SHOCKWAVES.get().spawn(x,y,col);
  snd('chain');
  if(depth>=5)return;
  const R2=105*105;
  const hits=ENEMIES.filter(e=>e.active && dist2(x,y,e.x,e.y)<R2);
  for(const e of hits){
    if(!e.active)continue;
    const ex=e.x,ey=e.y,ec=e.col,ep=e.pts;
    e.active=false;
    burst(ex,ey,ec,22,4.5,6); shake(5,.18); snd('explode');
    addScore(ep*(P.multi?2:1)*comboMult); onKill();
    const dropTypes=DIFF[difficulty].boosts?[...PU_TYPES]:PU_TYPES.filter(t=>t!=='boost');
    if(Math.random()<.1) PUPS.get().spawn(ex,ey,dropTypes[rngI(0,dropTypes.length-1)]);
    const idx=ENEMIES.indexOf(e); if(idx!==-1)ENEMIES.splice(idx,1);
    triggerChain(ex,ey,ec,depth+1);
  }
}

// ═══════════════════════════════════════════════════════════
//  POWER-UPS
// ═══════════════════════════════════════════════════════════
const PU_TYPES  = ['rapid','spread','shield','multi','boost'];
const PU_COLORS = { rapid:C.cyan, spread:C.magenta, shield:C.yellow, multi:C.green, boost:'#ffffff' };
const PU_LABELS = { rapid:'RAPID', spread:'SPRD', shield:'SHLD', multi:'×2', boost:'BOOST' };

class PowerUp {
  constructor(){ this.active=false; }
  spawn(x,y,type){
    this.active=true; this.x=x; this.y=y; this.type=type;
    this.col=PU_COLORS[type]; this.t=0; this.vy=1.35; this.w=26; this.h=26;
  }
  update(dt){ this.y+=this.vy*dt*60; this.t+=dt; if(this.y>H+40)this.active=false; }
  draw(ctx){
    const pulse=.65+.35*Math.sin(this.t*6);
    ctx.shadowColor=this.col; ctx.shadowBlur=14*pulse;
    ctx.strokeStyle=this.col; ctx.lineWidth=this.type==='boost'?2.5:2;
    ctx.strokeRect(this.x-13,this.y-13,26,26);
    ctx.fillStyle=this.col+'28'; ctx.fillRect(this.x-13,this.y-13,26,26);
    if(this.type==='boost'){ctx.shadowColor='#fff';ctx.shadowBlur=20*pulse;ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(this.x-11,this.y-11,22,22);}
    ctx.shadowBlur=0; ctx.fillStyle=this.col;
    ctx.font='bold 9px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(PU_LABELS[this.type],this.x,this.y); ctx.textBaseline='alphabetic';
  }
  get bounds(){ return{x:this.x-13,y:this.y-13,w:26,h:26}; }
}
const PUPS=new Pool(PowerUp,24);

// ═══════════════════════════════════════════════════════════
//  PLAYER   — moves in bottom 2/3, respects PLAYER_Y_MAX
// ═══════════════════════════════════════════════════════════
let PLAYER_Y_MIN = H / 3;
let PLAYER_Y_MAX = H - 22;

const P={
  x:W*.5, y:H-60, w:40, h:30, spd:5.0,
  hp:3, maxHp:3,
  inv:false, invT:0,
  rapid:false, rapidT:0, spread:false, spreadT:0, shield:false,
  multi:false, multiT:0, boost:false, boostT:0,
  shotT:0, shotRate:.17, thrT:0,

  reset(){
    this.x=W*.5; this.y=Math.min(H-60, PLAYER_Y_MAX-20);
    this.spd=DIFF[difficulty].pSpd;
    this.hp=this.maxHp; this.inv=false; this.invT=0;
    this.rapid=false; this.rapidT=0; this.spread=false; this.spreadT=0; this.shield=false;
    this.multi=false; this.multiT=0; this.boost=false; this.boostT=0; this.shotT=0;
  },

  update(dt){
    const curSpd=this.spd*(this.boost?2.3:1);

    // Keyboard — 8-directional (all devices)
    let dx=(INP.right?1:0)-(INP.left?1:0);
    let dy=(INP.down?1:0)-(INP.up?1:0);

    if(isMobile){
      // Joystick overrides keyboard direction on mobile
      if(JOY.active){ dx=JOY.dx; dy=JOY.dy; }
    } else {
      // Desktop: mouse/trackpad follow
      if(INP.touchX!==null){
        const tx=clamp(INP.touchX,22,W-22);
        const ty=clamp(INP.touchY!==null?INP.touchY:this.y,PLAYER_Y_MIN,PLAYER_Y_MAX);
        const tdx=tx-this.x, tdy=ty-this.y;
        const td=Math.sqrt(tdx*tdx+tdy*tdy)||1, step=curSpd*dt*60;
        this.x+=tdx/td*Math.min(step,Math.abs(tdx));
        this.y+=tdy/td*Math.min(step,Math.abs(tdy));
        dx=0; dy=0; // mouse takes full control
      }
    }

    if(dx||dy){
      const mag=Math.sqrt(dx*dx+dy*dy)||1;
      this.x=clamp(this.x+(dx/mag)*curSpd*dt*60,22,W-22);
      this.y=clamp(this.y+(dy/mag)*curSpd*dt*60,PLAYER_Y_MIN,PLAYER_Y_MAX);
    }

    // Timers
    if(this.inv)    {this.invT   -=dt;if(this.invT   <=0)this.inv=false;}
    if(this.rapid)  {this.rapidT -=dt;if(this.rapidT <=0)this.rapid=false;}
    if(this.spread) {this.spreadT-=dt;if(this.spreadT<=0)this.spread=false;}
    if(this.multi)  {this.multiT -=dt;if(this.multiT <=0)this.multi=false;}
    if(this.boost)  {this.boostT -=dt;if(this.boostT <=0)this.boost=false;}

    // Shoot — keyboard/mouse fire OR mobile fire button
    this.shotT-=dt;
    const rate=this.rapid?this.shotRate*.32:this.shotRate;
    const doFire = INP.fire || (isMobile ? fireBtnActive : INP.touchFire);
    if(doFire && this.shotT<=0){
      this.shotT=rate;
      if(this.spread){
        playerShot(this.x,this.y-12,-1.7,-9.1);
        playerShot(this.x,this.y-12, 0,  -9.6);
        playerShot(this.x,this.y-12, 1.7,-9.1);
      } else { playerShot(this.x,this.y-12,0,-9.6); }
    }

    // Exhaust particles
    this.thrT+=dt;
    const thrCol=this.boost?C.orange:C.cyan;
    if(Math.random()<.45) exhaust(this.x+rng(-6,6),this.y+15,thrCol);
    if(this.spread&&Math.random()<.3) exhaust(this.x+rng(-12,12),this.y+12,C.magenta);
    if(this.boost&&Math.random()<.6)  exhaust(this.x+rng(-8,8),this.y+18,C.orange);
  },

  hit(){
    if(this.inv)return false;
    if(this.shield){this.shield=false;shake(5,.25);burst(this.x,this.y,C.yellow,12,2.5,4);snd('hit');return false;}
    this.hp--; this.inv=true; this.invT=2.5;
    shake(11,.45); burst(this.x,this.y,C.red,22,3.5,6); snd('hit');
    return true;
  },

  draw(ctx){
    if(this.inv&&Math.floor(Date.now()/75)%2===0)return;
    const x=this.x,y=this.y,thrCol=this.boost?C.orange:C.cyan;

    const fh=9+7*Math.abs(Math.sin(this.thrT*22));
    const fg=ctx.createLinearGradient(x,y+13,x,y+13+fh);
    fg.addColorStop(0,thrCol+'cc'); fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.moveTo(x-7,y+13); ctx.lineTo(x+7,y+13); ctx.lineTo(x,y+13+fh); ctx.fill();
    [-18,18].forEach(ox=>{
      const fh2=4+3*Math.abs(Math.sin(this.thrT*18+ox));
      const fg2=ctx.createLinearGradient(x+ox,y+11,x+ox,y+11+fh2);
      fg2.addColorStop(0,thrCol+'88'); fg2.addColorStop(1,'transparent');
      ctx.fillStyle=fg2;
      ctx.beginPath(); ctx.moveTo(x+ox-3,y+11); ctx.lineTo(x+ox+3,y+11); ctx.lineTo(x+ox,y+11+fh2); ctx.fill();
    });

    if(this.shield){
      const sp=Date.now()/500;
      ctx.strokeStyle=C.yellow; ctx.lineWidth=2; ctx.shadowColor=C.yellow; ctx.shadowBlur=12;
      ctx.setLineDash([8,4]); ctx.lineDashOffset=-sp*20;
      ctx.beginPath(); ctx.ellipse(x,y-1,30,26,0,0,PI2); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur=0;
    }

    if(this.boost){
      ctx.strokeStyle=C.orange+'99'; ctx.lineWidth=1.5; ctx.shadowColor=C.orange; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.ellipse(x,y,28+4*Math.sin(this.thrT*12),24+3*Math.sin(this.thrT*12),0,0,PI2); ctx.stroke();
      ctx.shadowBlur=0;
    }

    const sc=this.boost?C.yellow:C.cyan;
    ctx.shadowColor=sc; ctx.shadowBlur=14; ctx.fillStyle=sc;
    ctx.beginPath();
    ctx.moveTo(x,y-15); ctx.lineTo(x+11,y+9); ctx.lineTo(x+7,y+9);
    ctx.lineTo(x+7,y+14); ctx.lineTo(x-7,y+14); ctx.lineTo(x-7,y+9); ctx.lineTo(x-11,y+9);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=sc+'bb';
    ctx.beginPath(); ctx.moveTo(x-11,y+3); ctx.lineTo(x-22,y+13); ctx.lineTo(x-7,y+11); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+11,y+3); ctx.lineTo(x+22,y+13); ctx.lineTo(x+7,y+11); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#003366'; ctx.beginPath(); ctx.ellipse(x,y-2,4.5,7,0,0,PI2); ctx.fill();
    ctx.fillStyle='#00aaff55'; ctx.beginPath(); ctx.ellipse(x-1,y-4,2,3.5,0,0,PI2); ctx.fill();
    ctx.shadowBlur=0;
  },

  get bounds(){ return{x:this.x-13,y:this.y-15,w:26,h:28}; }
};

const ECFG=[
  {hp:1,pts:10, col:C.cyan,    w:28,h:22,rate:4.0},
  {hp:2,pts:25, col:C.magenta, w:30,h:24,rate:2.5},
  {hp:3,pts:50, col:C.green,   w:26,h:26,rate:3.0},
];

class Enemy {
  constructor(){ this.active=false; }
  init(x,y,type){
    const c=ECFG[type];
    this.active=true; this.x=x; this.y=y; this.type=type;
    this.t=rng(0,PI2); this.baseX=x; this.baseY=y;
    this.hp=this.maxHp=c.hp; this.pts=c.pts; this.col=c.col;
    this.w=c.w; this.h=c.h; this.shotT=rng(1,4); this.shotRate=c.rate;
    this.phase='entry'; this.diveOx=0; this.diveOy=0; this.diveTx=0; this.diveTy=0; this.diveT=0;
    return this;
  }
  update(dt,wspd){
    this.t+=dt; this.shotT-=dt;
    if(this.phase==='entry'){ this.y+=2.2*dt*60; if(this.y>=this.baseY){this.y=this.baseY;this.phase='patrol';} return; }
    if(this.type===1){ this.x=this.baseX+Math.sin(this.t*1.4)*55; this.y=this.baseY+Math.sin(this.t*.55)*12; }
    else if(this.type===2){
      if(this.phase==='patrol'){
        this.x=this.baseX+Math.sin(this.t*.9)*28;
        if(Math.random()<.004){ this.phase='dive'; this.diveOx=this.x; this.diveOy=this.y; this.diveTx=P.x+rng(-30,30); this.diveTy=H+50; this.diveT=0; }
      } else if(this.phase==='dive'){
        this.diveT+=dt*.9*wspd;
        this.x=lerp(this.diveOx,this.diveTx,this.diveT); this.y=lerp(this.diveOy,this.diveTy,this.diveT);
        if(this.shotT<=0){this.shotT=.45;const ang=Math.atan2(P.y-this.y,P.x-this.x);enemyShot(this.x,this.y+13,Math.cos(ang)*4.2,Math.sin(ang)*4.2,C.green);}
        if(this.diveT>=1){this.baseX=rng(50,W-50);this.baseY=rng(90,220);this.x=this.baseX;this.y=-40;this.phase='entry';this.diveT=0;}
      }
    }
    if(this.type!==2&&this.shotT<=0){
      this.shotT=this.shotRate/wspd;
      if(Math.random()<.28){const ang=Math.atan2(P.y-this.y,P.x-this.x);const sp=this.type===1?4:2.8;enemyShot(this.x,this.y+12,Math.cos(ang)*sp,Math.sin(ang)*sp,null);}
    }
  }
  hit(dmg){ this.hp-=(dmg||1); shake(3,.1); burst(this.x,this.y,this.col,7,2,3); if(this.hp<=0){this.die();return true;} return false; }
  die(){
    this.active=false; burst(this.x,this.y,this.col,28,4.5,6); shake(6,.22); snd('explode');
    const dropTypes=DIFF[difficulty].boosts?[...PU_TYPES]:PU_TYPES.filter(t=>t!=='boost');
    if(Math.random()<.13) PUPS.get().spawn(this.x,this.y,dropTypes[rngI(0,dropTypes.length-1)]);
  }
  draw(ctx){
    const x=this.x,y=this.y;
    ctx.shadowColor=this.col; ctx.shadowBlur=10;
    if(this.type===0){
      ctx.fillStyle=this.col;
      ctx.beginPath(); ctx.moveTo(x,y-11); ctx.lineTo(x+14,y+9); ctx.lineTo(x+8,y+11); ctx.lineTo(x,y+5); ctx.lineTo(x-8,y+11); ctx.lineTo(x-14,y+9); ctx.closePath(); ctx.fill();
      ctx.fillStyle=C.orange; ctx.fillRect(x-5,y+5,4,6); ctx.fillRect(x+1,y+5,4,6);
      ctx.fillStyle='#ff002288'; ctx.beginPath(); ctx.arc(x,y-1,4,0,PI2); ctx.fill();
    } else if(this.type===1){
      ctx.fillStyle=this.col;
      ctx.beginPath(); ctx.moveTo(x,y+12); ctx.bezierCurveTo(x+18,y+8,x+20,y-8,x+9,y-12); ctx.lineTo(x,y-5); ctx.lineTo(x-9,y-12); ctx.bezierCurveTo(x-20,y-8,x-18,y+8,x,y+12); ctx.fill();
      ctx.strokeStyle=this.col; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x-12,y+4); ctx.quadraticCurveTo(x-21,y+18,x-9,y+21); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+12,y+4); ctx.quadraticCurveTo(x+21,y+18,x+9,y+21); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y-1,5,0,PI2); ctx.fill();
      ctx.fillStyle='#880000'; ctx.beginPath(); ctx.arc(x,y-1,3,0,PI2); ctx.fill();
    } else {
      ctx.fillStyle=this.col;
      ctx.beginPath(); ctx.moveTo(x,y+13); ctx.lineTo(x-13,y-4); ctx.lineTo(x-6,y-13); ctx.lineTo(x,y-5); ctx.lineTo(x+6,y-13); ctx.lineTo(x+13,y-4); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffffff99'; ctx.beginPath(); ctx.arc(x,y,4.5,0,PI2); ctx.fill();
    }
    if(this.maxHp>1){
      ctx.fillStyle='#222'; ctx.fillRect(x-this.w*.5,y-this.h*.5-7,this.w,3);
      ctx.fillStyle=this.col; ctx.fillRect(x-this.w*.5,y-this.h*.5-7,this.w*(this.hp/this.maxHp),3);
    }
    ctx.shadowBlur=0;
  }
  get bounds(){ return{x:this.x-this.w*.5,y:this.y-this.h*.5,w:this.w,h:this.h}; }
}
const EPOOL=new Pool(Enemy,120);

// ═══════════════════════════════════════════════════════════
//  ENEMY LIST + FORMATION
// ═══════════════════════════════════════════════════════════
let ENEMIES=[], FX=0, FD=1;

function tickFormation(dt,wv){
  if(BOSS.active)return;
  const g=ENEMIES.filter(e=>e.active&&e.type===0&&e.phase==='patrol');
  if(!g.length)return;
  const nextFX=FX+FD*.82*(1+(wv-1)*.05)*dt*60;
  let lo=W,hi=0;
  for(const e of g){lo=Math.min(lo,e.baseX+nextFX);hi=Math.max(hi,e.baseX+nextFX);}
  if(lo<24||hi>W-24){FD*=-1;for(const e of g)e.baseY=Math.min(e.baseY+22,H*.65);}
  else FX=nextFX;
  for(const e of g){e.x=e.baseX+FX;e.y=e.baseY;}
}

// ═══════════════════════════════════════════════════════════
//  WAVES
// ═══════════════════════════════════════════════════════════
let wave=0,wspd=1,waveClear=false,waveT=0,waveAnn=0,bossFight=false,waveBonusDone=false;

function startWave(n){
  wave=n;
  const d=DIFF[difficulty];
  wspd=d.wspdBase+(n-1)*d.wspdScale;
  FX=0;FD=1;waveClear=false;waveT=0;waveAnn=2.6;waveBonusDone=false;
  bossFight=(n%5===0);
  for(const e of ENEMIES)e.active=false;
  ENEMIES=[];BOSS.active=false;BULLETS.clear();WELLS.clear();
  snd('wave');
  if(bossFight){BOSS.init(n);}
  else{const fns=[spawnGrid,spawnV,spawnWave,spawnMixed];fns[Math.min(n-1,fns.length-1)](n);}
  for(let i=0;i<d.wells;i++){WELLS.get().spawn(rng(80,W-80),rng(60,H*.44));if(i===0)snd('well');}
}

function spawnGrid(n){
  const d=DIFF[difficulty];
  const cols=clamp(Math.round((5+n*.6)*Math.sqrt(d.enemyMult)),4,11);
  const rows=clamp(Math.round((1+n*.35)*Math.sqrt(d.enemyMult)),1,5);
  const types=n<=2?[0]:n<=4?[0,1]:[0,1,2];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const type=types[Math.min(r,types.length-1)];
    const x=80+c*(W-160)/Math.max(cols-1,1);
    const e=EPOOL.get().init(x,-60-r*55,type);
    e.baseX=x-FX;e.baseY=80+r*56;ENEMIES.push(e);
  }
}
function spawnV(n){
  const d=DIFF[difficulty];
  const arm=clamp(Math.round((3+n*.4)*Math.pow(d.enemyMult,.4)),3,9);
  for(let i=0;i<arm;i++){
    [[-1,i],[1,i]].forEach(([s,idx])=>{
      if(i===0&&s===1)return;
      const x=W*.5+s*idx*52;
      const e=EPOOL.get().init(x,-60-idx*45,Math.min(idx,2));
      e.baseX=x-FX;e.baseY=80+idx*45;ENEMIES.push(e);
    });
  }
}
function spawnWave(n){
  const d=DIFF[difficulty];
  const cnt=clamp(Math.round((8+n)*Math.sqrt(d.enemyMult)),8,20);
  for(let i=0;i<cnt;i++){
    const x=60+(i/(cnt-1))*(W-120);
    const e=EPOOL.get().init(x,-70-Math.abs(Math.sin(i*.65))*90,i%3);
    e.baseX=x-FX;e.baseY=80+(i%3)*52;ENEMIES.push(e);
  }
}
function spawnMixed(n){
  spawnGrid(n-1);
  for(let i=0;i<4;i++){const x=rng(70,W-70);const e=EPOOL.get().init(x,-80-i*50,2);e.baseX=x;e.baseY=rng(95,200);ENEMIES.push(e);}
}

// ═══════════════════════════════════════════════════════════
//  SCORE + COMBO + LIVES
// ═══════════════════════════════════════════════════════════
let score=0,hiScore=0,lives=3,combo=0,comboMult=1,comboT=0;

function addScore(pts){score+=Math.floor(pts);if(score>hiScore)hiScore=score;}
function onKill(){combo++;comboT=3.2;comboMult=Math.min(1+Math.floor(combo/5),8);}
function resetCombo(){combo=0;comboMult=1;comboT=0;}

function loseLife(){
  if(GS!=='play')return;
  lives--;resetCombo();
  if(lives<=0){doGameOver();return;}
  P.reset();P.inv=true;P.invT=3;shake(14,.8);
}

// ═══════════════════════════════════════════════════════════
//  COLLISIONS
// ═══════════════════════════════════════════════════════════
function checkCollisions(){
  const pb=P.bounds;

  BULLETS.forEach(b=>{
    if(b.isPlayer){
      if(BOSS.active&&overlap(b.bounds,BOSS.bounds)){b.active=false;if(BOSS.hit(1))addScore(BOSS.pts);return;}
      for(let i=ENEMIES.length-1;i>=0;i--){
        const e=ENEMIES[i];if(!e.active)continue;
        if(overlap(b.bounds,e.bounds)){
          b.active=false;
          if(e.hit(1)){
            addScore(e.pts*(P.multi?2:1)*comboMult);onKill();
            const ex=e.x,ey=e.y,ec=e.col;
            ENEMIES.splice(i,1);
            if(DIFF[difficulty].chain)triggerChain(ex,ey,ec);
          }
          break;
        }
      }
    } else {
      if(!P.inv&&overlap(b.bounds,pb)){b.active=false;if(P.hit())loseLife();}
    }
  });

  for(let i=ENEMIES.length-1;i>=0;i--){
    const e=ENEMIES[i];
    if(!e.active){ENEMIES.splice(i,1);continue;}
    if(e.y>H+24){e.active=false;ENEMIES.splice(i,1);if(P.hit())loseLife();continue;}
    if(overlap(e.bounds,pb)){e.die();ENEMIES.splice(i,1);if(P.hit())loseLife();}
  }

  PUPS.forEach(pu=>{if(overlap(pu.bounds,pb)){pu.active=false;applyPU(pu.type);}});

  WELLS.forEach(w=>{
    if(dist2(P.x,P.y,w.x,w.y)<w.killR*w.killR){
      burst(P.x,P.y,C.purple,20,4,6);shake(14,.5);snd('bigexplode');
      if(P.hit())loseLife();
    }
  });
}

function applyPU(type){
  snd(type==='boost'?'boost':'powerup');addScore(75);
  if(type==='rapid') {P.rapid=true; P.rapidT=6;}
  if(type==='spread'){P.spread=true;P.spreadT=8;}
  if(type==='shield'){P.shield=true;}
  if(type==='multi') {P.multi=true; P.multiT=10;}
  if(type==='boost') {P.boost=true; P.boostT=5;}
}

const JOY = { active:false, cx:0, cy:0, kx:0, ky:0, dx:0, dy:0, r:50 };
let fireBtnActive = false;
let joyTouchId = -1;
let fireTouchId = -1;

function drawMobileControls(){
  if((!isMobile && W >= 500) || GS!=='play') return;  // show when touch device OR in portrait

  const ctrlH = W<500 ? 135 : 115;
  const ctrlY = H - ctrlH;

  // Semi-transparent control zone background
  ctx.fillStyle='rgba(0,0,20,0.40)';
  ctx.fillRect(0, ctrlY, W, ctrlH);
  ctx.strokeStyle='rgba(0,120,180,0.25)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,ctrlY);ctx.lineTo(W,ctrlY);ctx.stroke();

  // ── JOYSTICK ──────────────────────────────────────────────
  const jGhostX = 75, jGhostY = H - 65;
  const jcx = JOY.active ? JOY.cx : jGhostX;
  const jcy = JOY.active ? JOY.cy : jGhostY;
  const jkx = JOY.active ? JOY.kx : jGhostX;
  const jky = JOY.active ? JOY.ky : jGhostY;
  const jAlpha = JOY.active ? 0.85 : 0.35;

  ctx.globalAlpha = jAlpha;
  // Outer ring
  ctx.shadowColor=C.cyan; ctx.shadowBlur=JOY.active?12:4;
  ctx.strokeStyle=JOY.active?C.cyan:'rgba(0,180,220,0.8)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(jcx,jcy,JOY.r,0,PI2); ctx.stroke();

  // Cross-hair ticks
  ctx.shadowBlur=0; ctx.strokeStyle='rgba(0,150,200,0.5)'; ctx.lineWidth=1;
  [0,Math.PI*.5,Math.PI,Math.PI*1.5].forEach(a=>{
    ctx.beginPath();
    ctx.moveTo(jcx+Math.cos(a)*(JOY.r-12),jcy+Math.sin(a)*(JOY.r-12));
    ctx.lineTo(jcx+Math.cos(a)*(JOY.r-4), jcy+Math.sin(a)*(JOY.r-4));
    ctx.stroke();
  });

  // Knob
  ctx.shadowColor=C.cyan; ctx.shadowBlur=JOY.active?14:3;
  ctx.fillStyle=JOY.active?C.cyan:'rgba(0,180,220,0.9)';
  ctx.beginPath(); ctx.arc(jkx,jky,JOY.active?22:18,0,PI2); ctx.fill();

  // Inner dot on knob
  ctx.shadowBlur=0; ctx.fillStyle='rgba(0,0,30,0.6)';
  ctx.beginPath(); ctx.arc(jkx,jky,6,0,PI2); ctx.fill();
  ctx.globalAlpha=1;

  // ── FIRE BUTTON ───────────────────────────────────────────
  const fbx = W-75, fby = H-65, fbR = 44;
  const fbA = fireBtnActive ? 0.95 : 0.5;
  ctx.globalAlpha = fbA;
  ctx.shadowColor=C.red; ctx.shadowBlur=fireBtnActive?22:8;
  ctx.strokeStyle=fireBtnActive?C.red:'rgba(255,50,80,0.8)';
  ctx.lineWidth=fireBtnActive?3:2;
  ctx.beginPath(); ctx.arc(fbx,fby,fbR,0,PI2); ctx.stroke();
  ctx.fillStyle=fireBtnActive?'rgba(255,30,60,0.4)':'rgba(255,30,60,0.12)';
  ctx.beginPath(); ctx.arc(fbx,fby,fbR,0,PI2); ctx.fill();
  ctx.shadowColor=C.red; ctx.shadowBlur=fireBtnActive?16:6;
  ctx.fillStyle=fireBtnActive?'#fff':'rgba(255,100,120,0.95)';
  ctx.font=`bold ${fireBtnActive?14:13}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('FIRE',fbx,fby);
  ctx.textBaseline='alphabetic';
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawTitle(dt){
  titleT+=dt; blinkT+=dt;
  const narrow = W < 500; // portrait mobile

  // Panel
  const panX=narrow?18:50, panY=70;
  const panW=W-(narrow?36:100);
  const panH=narrow?572:404;
  ctx.fillStyle='rgba(0,0,0,0.50)'; ctx.fillRect(panX,panY,panW,panH);
  ctx.strokeStyle=C.cyan; ctx.lineWidth=2; ctx.shadowColor=C.cyan; ctx.shadowBlur=14;
  ctx.strokeRect(panX,panY,panW,panH); ctx.shadowBlur=0;

  // Title
  const titleFont = narrow ? 38 : 54;
  ctx.shadowColor=C.cyan; ctx.shadowBlur=22; ctx.fillStyle=C.cyan;
  ctx.font=`bold ${titleFont}px monospace`; ctx.textAlign='center';
  ctx.fillText('STELLAR', W*.5, narrow?118:143);
  ctx.shadowColor=C.magenta; ctx.fillStyle=C.magenta;
  ctx.fillText('ASSAULT', W*.5, narrow?160:198);
  ctx.shadowBlur=8; ctx.fillStyle=C.green; ctx.font='12px monospace';
  ctx.fillText('— ARCADE SPACE SHOOTER —', W*.5, narrow?180:222); ctx.shadowBlur=0;

  // Controls hint
  ctx.fillStyle='#5566aa'; ctx.font='10px monospace';
  if(isMobile){
    ctx.fillText('JOYSTICK  ·  MOVE       FIRE BUTTON  ·  SHOOT', W*.5, narrow?196:244);
  } else {
    ctx.fillText('WASD / ARROWS  ·  MOVE          SPACE / CLICK  ·  FIRE', W*.5, narrow?196:244);
  }

  // Mode buttons
  const modes=[
    {key:'ez',   label:'EZ MODE',    col:C.green,  desc:['Classic shooter','No special mechanics']},
    {key:'mid',  label:'MID MODE',   col:C.yellow, desc:['Gravity wells','Chain explosions']},
    {key:'crazy',label:'CRAZY MODE', col:C.red,    desc:['Full chaos','Speed boosts + max enemies']},
  ];

  if(narrow){
    // Portrait: vertical stack
    const bW=panW-30, bH=62, gap=9;
    const bX=(W-bW)*.5, bY0=214;
    modes.forEach((m,i)=>{
      const bx=bX, by=bY0+i*(bH+gap);
      titleBtns[m.key]={x:bx,y:by,w:bW,h:bH};
      const hov=INP.mouseX>=bx&&INP.mouseX<=bx+bW&&INP.mouseY>=by&&INP.mouseY<=by+bH;
      const sel=difficulty===m.key;
      ctx.shadowColor=m.col; ctx.shadowBlur=sel?20:hov?10:4;
      ctx.strokeStyle=m.col; ctx.lineWidth=sel?3:1.5;
      ctx.strokeRect(bx,by,bW,bH);
      ctx.fillStyle=sel?m.col+'44':hov?m.col+'22':m.col+'0e'; ctx.fillRect(bx,by,bW,bH);
      ctx.shadowBlur=0;
      ctx.fillStyle=m.col; ctx.font=`bold ${sel?16:14}px monospace`; ctx.textAlign='center';
      ctx.fillText(m.label, W*.5, by+22);
      ctx.fillStyle='#aabbcc'; ctx.font='10px monospace';
      ctx.fillText(m.desc[0]+' · '+m.desc[1], W*.5, by+40);
      if(sel){ctx.fillStyle=m.col;ctx.font='bold 8px monospace';ctx.fillText('◀ SELECTED ▶',W*.5,by+56);}
    });
    // Hi-score
    if(hiScore>0){
      ctx.shadowColor=C.yellow;ctx.shadowBlur=8;ctx.fillStyle=C.yellow;
      ctx.font='bold 11px monospace';ctx.textAlign='center';
      ctx.fillText(`BEST  ${String(hiScore).padStart(8,'0')}`,W*.5,437);ctx.shadowBlur=0;
    }
    // Tap to start
    if(Math.floor(blinkT*2.2)%2===0){
      ctx.shadowColor=C.white;ctx.shadowBlur=14;ctx.fillStyle=C.white;
      ctx.font='bold 16px monospace';ctx.textAlign='center';
      ctx.fillText('TAP  TO  START',W*.5,472);ctx.shadowBlur=0;
    }
  } else {
    // Landscape: horizontal row
    const bw=178,bh=86,gap=12;
    const totalW=modes.length*(bw+gap)-gap;
    const startX=(W-totalW)*.5, by=262;
    modes.forEach((m,i)=>{
      const bx=startX+i*(bw+gap);
      titleBtns[m.key]={x:bx,y:by,w:bw,h:bh};
      const hov=INP.mouseX>=bx&&INP.mouseX<=bx+bw&&INP.mouseY>=by&&INP.mouseY<=by+bh;
      const sel=difficulty===m.key;
      ctx.shadowColor=m.col;ctx.shadowBlur=sel?22:hov?12:5;
      ctx.strokeStyle=m.col;ctx.lineWidth=sel?3:1.5;
      ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle=sel?m.col+'44':hov?m.col+'20':m.col+'10';ctx.fillRect(bx,by,bw,bh);
      ctx.shadowBlur=0;
      ctx.fillStyle=m.col;ctx.font=`bold ${sel?17:15}px monospace`;ctx.textAlign='center';
      ctx.fillText(m.label,bx+bw*.5,by+26);
      ctx.fillStyle='#aabbcc';ctx.font='10px monospace';
      m.desc.forEach((ln,j)=>ctx.fillText(ln,bx+bw*.5,by+46+j*14));
      if(sel){ctx.fillStyle=m.col;ctx.font='bold 9px monospace';ctx.fillText('◀ SELECTED ▶',bx+bw*.5,by+80);}
    });
    if(hiScore>0){
      ctx.shadowColor=C.yellow;ctx.shadowBlur=8;ctx.fillStyle=C.yellow;
      ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillText(`BEST  ${String(hiScore).padStart(8,'0')}`,W*.5,375);ctx.shadowBlur=0;
    }
    if(Math.floor(blinkT*2.2)%2===0){
      ctx.shadowColor=C.white;ctx.shadowBlur=16;ctx.fillStyle=C.white;
      ctx.font='bold 20px monospace';ctx.textAlign='center';
      ctx.fillText('PRESS  SPACE / CLICK  TO START',W*.5,412);ctx.shadowBlur=0;
    }
  }

  // Enemy showcase
  for(let i=0;i<3;i++){
    const ex=W*.5+(i-1)*(narrow?110:145)+Math.sin(titleT*.9+i)*10;
    const dummy=EPOOL.get();
    dummy.x=ex; dummy.y=H-42; dummy.type=i; dummy.t=titleT+i*.6;
    dummy.w=ECFG[i].w; dummy.h=ECFG[i].h; dummy.hp=dummy.maxHp=ECFG[i].hp;
    dummy.active=true; dummy.draw(ctx); dummy.active=false;
  }
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
const INP={left:false,right:false,up:false,down:false,fire:false,touchX:null,touchY:null,touchFire:false,mouseX:0,mouseY:0};

function hitTitleBtn(cx,cy){
  for(const[key,btn]of Object.entries(titleBtns)){
    if(cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){difficulty=key;return true;}
  }
  return false;
}
function hitMenuBtn(cx,cy){
  return cx>=menuBtnRect.x&&cx<=menuBtnRect.x+menuBtnRect.w&&cy>=menuBtnRect.y&&cy<=menuBtnRect.y+menuBtnRect.h;
}
function hitGoMenuBtn(cx,cy){
  return cx>=goMenuBtnRect.x&&cx<=goMenuBtnRect.x+goMenuBtnRect.w&&cy>=goMenuBtnRect.y&&cy<=goMenuBtnRect.y+goMenuBtnRect.h;
}

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft' ||e.code==='KeyA'){INP.left =true;}
  if(e.code==='ArrowRight'||e.code==='KeyD'){INP.right=true;}
  if(e.code==='ArrowUp'   ||e.code==='KeyW'){INP.up   =true;}
  if(e.code==='ArrowDown' ||e.code==='KeyS'){INP.down =true;}
  if(e.code==='Space'){
    e.preventDefault(); INP.fire=true;
    if(GS==='title')startGame();
    if(GS==='gameover'&&goTimer>1.6)startGame();
  }
  if(e.code==='Escape'){
    e.preventDefault();
    if(GS==='play'||GS==='gameover')goToTitle();
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft' ||e.code==='KeyA'){INP.left =false;}
  if(e.code==='ArrowRight'||e.code==='KeyD'){INP.right=false;}
  if(e.code==='ArrowUp'   ||e.code==='KeyW'){INP.up   =false;}
  if(e.code==='ArrowDown' ||e.code==='KeyS'){INP.down =false;}
  if(e.code==='Space')INP.fire=false;
});

// ── Mouse ──────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  INP.mouseX=(e.clientX-r.left)/scale; INP.mouseY=(e.clientY-r.top)/scale;
  if(GS==='play'){INP.touchX=INP.mouseX; INP.touchY=INP.mouseY;}
});
canvas.addEventListener('mouseleave',()=>{INP.touchX=null; INP.touchY=null;});

canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)/scale, cy=(e.clientY-r.top)/scale;
  if(GS==='title'){hitTitleBtn(cx,cy); startGame(); return;}
  if(GS==='gameover'){
    if(hitGoMenuBtn(cx,cy)){goToTitle();return;}
    if(goTimer>1.6)startGame();
    return;
  }
  if(GS==='play'){
    if(hitMenuBtn(cx,cy)){goToTitle();return;}
    INP.fire=true;
  }
});
canvas.addEventListener('mouseup',()=>INP.fire=false);

// ── Touch (multi-touch with joystick + fire) ───────────────
function canvasXY(touch){
  const r=canvas.getBoundingClientRect();
  return {cx:(touch.clientX-r.left)/scale, cy:(touch.clientY-r.top)/scale};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const {cx,cy}=canvasXY(t);

    if(GS==='title'){
      hitTitleBtn(cx,cy); startGame(); return;
    }
    if(GS==='gameover'){
      if(hitGoMenuBtn(cx,cy)){goToTitle();return;}
      if(goTimer>1.6)startGame();
      return;
    }

    // GS === 'play'
    if(isMobile){
      // Check menu button first
      if(hitMenuBtn(cx,cy)){goToTitle();return;}
      if(cx < W*0.55){
        // Left zone → joystick
        if(joyTouchId===-1){
          joyTouchId=t.identifier;
          JOY.active=true; JOY.cx=cx; JOY.cy=cy;
          JOY.kx=cx; JOY.ky=cy; JOY.dx=0; JOY.dy=0;
        }
      } else {
        // Right zone → fire button
        if(fireTouchId===-1){
          fireTouchId=t.identifier;
          fireBtnActive=true;
        }
      }
    } else {
      // Non-mobile touch (desktop trackpad)
      INP.touchX=cx; INP.touchY=cy; INP.touchFire=true;
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const {cx,cy}=canvasXY(t);
    if(isMobile && GS==='play'){
      if(t.identifier===joyTouchId){
        const jdx=cx-JOY.cx, jdy=cy-JOY.cy;
        const jd=Math.sqrt(jdx*jdx+jdy*jdy)||1;
        if(jd<=JOY.r){ JOY.kx=cx; JOY.ky=cy; }
        else { JOY.kx=JOY.cx+(jdx/jd)*JOY.r; JOY.ky=JOY.cy+(jdy/jd)*JOY.r; }
        JOY.dx=(JOY.kx-JOY.cx)/JOY.r;
        JOY.dy=(JOY.ky-JOY.cy)/JOY.r;
      }
    } else {
      if(GS==='play'){INP.touchX=cx; INP.touchY=cy;}
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier===joyTouchId){
      joyTouchId=-1; JOY.active=false; JOY.dx=0; JOY.dy=0;
      JOY.kx=JOY.cx; JOY.ky=JOY.cy;
    }
    if(t.identifier===fireTouchId){
      fireTouchId=-1; fireBtnActive=false;
    }
    if(!isMobile){
      if(e.touches.length===0){INP.touchX=null; INP.touchY=null; INP.touchFire=false;}
    }
  }
},{passive:false});

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
let last=0;
let activeWellCache=[];

function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min((ts-last)/1000,.05); last=ts;

  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(shX,shY);

  for(const s of stars){s.update(dt);s.draw(ctx);}

  if(GS==='title'){
    drawTitle(dt);
    ctx.restore();
    drawCRT();
    return;
  }

  // ── UPDATE ──
  if(GS==='play'){
    tickShake(dt);
    P.update(dt);

    for(let i=ENEMIES.length-1;i>=0;i--){
      const e=ENEMIES[i]; if(!e.active){ENEMIES.splice(i,1);continue;}
      e.update(dt,wspd);
    }
    tickFormation(dt,wave);
    if(BOSS.active)BOSS.update(dt);

    BULLETS.update(dt);
    SHOCKWAVES.update(dt);
    PARTS.update(dt);
    PUPS.update(dt);
    WELLS.update(dt);

    if(DIFF[difficulty].wells>0){
      activeWellCache=WELLS.all.filter(w=>w.active);
      if(activeWellCache.length>0){
        BULLETS.forEach(b=>b.applyGravity(activeWellCache,dt));
      }
    }

    if(comboT>0){comboT-=dt; if(comboT<=0)resetCombo();}

    const allClear=!BOSS.active&&ENEMIES.filter(e=>e.active).length===0;
    if(allClear&&!waveClear){waveClear=true; waveT=3.2;}
    if(waveClear){
      waveT-=dt;
      if(!waveBonusDone){waveBonusDone=true; addScore(wave*150);}
      if(waveT<=0)startWave(wave+1);
    }
    if(waveAnn>0)waveAnn-=dt;

    checkCollisions();
  }

  // ── DRAW ──
  drawPlayerZone();
  PARTS.draw();
  WELLS.draw();
  SHOCKWAVES.draw();
  PUPS.draw();
  for(const e of ENEMIES)if(e.active)e.draw(ctx);
  if(BOSS.active)BOSS.draw(ctx);
  BULLETS.draw();
  if(GS==='play')P.draw(ctx);

  drawHUD();
  drawAnnounce(waveAnn);

  if(waveClear&&waveT>0){
    ctx.globalAlpha=Math.min(1,waveT*.5);
    ctx.shadowColor=C.green; ctx.shadowBlur=16; ctx.fillStyle=C.green;
    ctx.font=`bold ${W<500?22:30}px monospace`; ctx.textAlign='center';
    ctx.fillText('WAVE CLEAR!',W*.5,H*.5);
    ctx.fillStyle=C.yellow; ctx.shadowColor=C.yellow; ctx.font='15px monospace';
    ctx.fillText(`+${wave*150} BONUS`,W*.5,H*.5+34);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  if(GS==='gameover')drawGameOver(dt);

  ctx.restore();
  drawCRT();
  drawMobileControls(); // drawn outside shake, on top of CRT
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
resize();      // sets W, H, PLAYER_Y_MIN, PLAYER_Y_MAX, isMobile
initStars();
requestAnimationFrame(frame);

// ── PWA: register service worker ──────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/stellar-assault/sw.js', { scope: '/stellar-assault/' })
      .catch(() => {});
  });
}
</script>
